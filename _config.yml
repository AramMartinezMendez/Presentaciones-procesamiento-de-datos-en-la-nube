color-6: '##1abc9c'
color-7: '##1abc9c'
color-8: '##1abc9c'

# Configuración de colecciones para las diapositivas
collections:
  slides:
    output: true
    
# ... tus configuraciones existentes como title, description, baseurl, collections, etc.

# Configuración para las diapositivas
reveal:
  # El separador común es "----" en markdown, que se traduce a <hr /> en HTML
  slide_separator: "<hr />"
  # Con este separador, Jekyll buscará "----" en tu archivo .md
