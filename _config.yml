title: slides Procesaiento de datos en la nube
description: Enfoque y desarrollo en la inforación en slides al desarrollo de la nube

baseurl: "/Presentaciones-procesamiento-de-datos-en-la-nube" # the subpath of your site, e.g. /blog
url: "https://github.com/AramMartinezMendez" # the base hostname & protocol for your site
permalink: /:title/


compress_html:
  clippings: [html,div, p, ul, td, h1, h2, h3, h4,link, meta, footer, nav, img, header, hr, br, head, style, li, ul, ol, time, main, script, title]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []
  
  
analytics: UA-83979019-1

color-1: '#e74c3c'
color-2: '##1abc9c'
color-3: '##1abc9c'
color-4: '##1abc9c'
